<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADHD Bingo</title>
    <!-- 引入系统字体，Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- 引入 canvas-confetti 库 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- 头部标题区 -->
        <header class="header">
            <div class="header-content">
                <div class="header-left">
                    <div class="title-container">
                        <h1 class="title editable-title" id="main-title" contenteditable="true" spellcheck="false" title="点击可直接修改Bingo名称">ADHD Bingo</h1>
                        <div class="custom-mode-switcher">
                            <div class="title-dropdown-wrapper" id="custom-mode-trigger" title="点击切换内置词库模式">
                                <svg class="dropdown-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                            </div>
                            <div class="custom-dropdown-menu" id="custom-mode-menu">
                                <!-- 由 JS 动态渲染内置和自定义模式 -->
                            </div>
                        </div>
                    </div>
                    <div class="subtitle-row">
                        <div class="date-container" title="点击切换日期">
                            <svg class="calendar-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                            <span class="date-display" id="date-display">2026 · 03/07 · SAT</span>
                            <input type="date" id="date-picker" class="date-picker-hidden">
                        </div>
                        <button class="ai-gen-btn" id="btn-ai-gen" title="让大模型为您编排当前专属主题">✨ AI bingo!</button>
                    </div>
                </div>
                <div class="theme-controls">
                    <button class="icon-btn" id="btn-size-toggle" title="切换方块规模 (3x3 / 4x4 / 5x5)" style="width: auto; padding: 4px 8px; border-radius: 12px; font-family: inherit;">
                        <span id="size-icon-text" style="font-size: 13px; font-weight: 700; color: inherit;">5x5</span>
                    </button>
                    <button class="icon-btn" id="btn-theme-toggle" title="切换深/浅色模式">
                        <svg id="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                        <svg id="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                    </button>
                    <button class="icon-btn" id="btn-style-toggle" title="切换多巴胺彩色模式">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- 进度环形区 -->
        <section class="progress-section">
            <div class="progress-ring-container">
                <svg class="progress-ring" width="80" height="80">
                    <defs>
                        <linearGradient id="dopamine-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#B87D7D" />
                            <stop offset="30%" stop-color="#B89372" />
                            <stop offset="70%" stop-color="#738CA6" />
                            <stop offset="100%" stop-color="#9E7D96" />
                        </linearGradient>
                    </defs>
                    <circle class="progress-ring__background" id="progress-circle-bg" stroke="var(--ring-bg)" stroke-width="4" fill="transparent" r="36" cx="40" cy="40"/>
                    <circle class="progress-ring__circle" id="progress-circle" stroke="var(--ring-color)" stroke-width="4" fill="transparent" r="36" cx="40" cy="40" stroke-linecap="round"/>
                </svg>
                <div class="progress-text" id="progress-text">0%</div>
            </div>
            <div class="progress-info">
                <h2 class="progress-title">今日进度</h2>
                <p class="progress-subtitle" id="progress-subtitle">加油，保持节奏</p>
            </div>
        </section>

        <!-- 网格区 -->
        <section class="grid-section">
            <div class="bingo-grid" id="bingo-grid">
                <!-- 方块由 JavaScript 动态生成 -->
            </div>
        </section>

        <!-- 底部控制区 -->
        <footer class="footer">
            <div class="stats">
                <span id="lines-count">0</span> 条连线
            </div>
            <div class="controls">
                <button class="btn btn-pool" id="btn-pool">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    词库
                </button>
                <button class="btn btn-random" id="btn-random">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16 3 4 4-4 4"/><path d="M20 7H9a5 5 0 0 0-5 5v5"/><path d="m8 21-4-4 4-4"/><path d="M4 17h11a5 5 0 0 0 5-5v-5"/></svg>
                    随机
                </button>
                <button class="btn btn-reset" id="btn-reset">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    重置
                </button>
            </div>
        </footer>
    </div>

    <!-- 词库弹窗 -->
    <div class="modal-overlay" id="pool-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>偏好与词库 (<span id="pool-count">25</span>)</h3>
                <button class="close-btn" id="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="add-task-form">
                    <input type="text" id="new-task-input" placeholder="输入新习惯..." maxlength="12">
                    <button id="add-task-btn">添加</button>
                </div>
                <p class="pool-warning" id="pool-warning">⚠️ 词库条目数量较少，九宫格将出现重复留白！</p>
                <div class="task-chips" id="task-chips-container">
                    <!-- JS 渲染 -->
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
